<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Pós-Venda</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📋 Controle Pós-Venda</h1>

        <div class="infos">
            <div>Total Pedidos: <span id="totalPedidos">0</span></div>
            <div>Total Excedentes: R$ <span id="totalExcedentes">0,00</span></div>
        </div>
    </header>

    <section class="novoPedido">

        <input
            type="text"
            id="cliente"
            placeholder="Cliente">

        <input
            type="text"
            id="empresa"
            placeholder="Empresa">

        <input
            type="text"
            id="pedido"
            placeholder="Pedido">

        <input
            type="text"
            id="obsFrete"
            placeholder="OBS/FRETE (opcional)">

        <button onclick="adicionarPedido()">
            ➕ Adicionar Pedido
        </button>

    </section>

    <section class="pesquisa">

        <input
            type="text"
            id="pesquisa"
            placeholder="🔍 Buscar Cliente, Empresa ou Pedido"
            onkeyup="pesquisarPedidos()">

    </section>

    <section class="kanban">

        <div class="coluna alinhamento-coluna">
            <h2>
                ALINHAMENTO
                (<span id="count-alinhamento">0</span>)
            </h2>

            <div id="alinhamento" class="dropzone"></div>
        </div>

        <div class="coluna boleto-coluna">
            <h2>
                BOLETO
                (<span id="count-boleto">0</span>)
            </h2>

            <div id="boleto" class="dropzone"></div>
        </div>

        <div class="coluna pagamento-coluna">
            <h2>
                PAGAMENTO
                (<span id="count-pagamento">0</span>)
            </h2>

            <div id="pagamento" class="dropzone"></div>
        </div>

        <div class="coluna coleta-coluna">
            <h2>
                COLETA
                (<span id="count-coleta">0</span>)
            </h2>

            <div id="coleta" class="dropzone"></div>
        </div>

    </section>

    <section class="excedentes">

        <h2>💰 Excedentes</h2>

        <input
            type="text"
            id="nomeExcedente"
            placeholder="Cliente">

        <input
            type="number"
            id="valorExcedente"
            placeholder="Valor">

        <button onclick="adicionarExcedente()">
            Adicionar Excedente
        </button>

        <div id="listaExcedentes"></div>

        <br>

        <button onclick="limparTudo()">
            🗑 Limpar Tudo
        </button>

    </section>

    <!-- MODAL DE EDIÇÃO -->

    <div id="modalEditar" class="modal">

        <div class="modal-content">

            <h2>✏️ Editar Pedido</h2>

            <input
                type="text"
                id="editCliente"
                placeholder="Cliente">

            <input
                type="text"
                id="editEmpresa"
                placeholder="Empresa">

            <input
                type="text"
                id="editPedido"
                placeholder="Pedido">

            <input
                type="text"
                id="editObs"
                placeholder="OBS/FRETE">

            <div class="modal-botoes">

                <button onclick="salvarEdicao()">
                    💾 Salvar
                </button>

                <button onclick="fecharModal()">
                    ❌ Cancelar
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
