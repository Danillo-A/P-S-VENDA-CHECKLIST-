<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pós Venda</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📋 Controle Pós-Venda</h1>

    <div class="infos">
        <div>Total Pedidos: <span id="totalPedidos">0</span></div>
        <div>Total Excedentes: R$ <span id="totalExcedentes">0,00</span></div>
    </div>
</header>

<section class="novoPedido">

    <input type="text" id="cliente" placeholder="Cliente">

    <input type="text" id="empresa" placeholder="Empresa">

    <input type="text" id="pedido" placeholder="Pedido">

    <button onclick="adicionarPedido()">
        Adicionar Pedido
    </button>

</section>

<section class="pesquisa">

    <input
        type="text"
        id="pesquisa"
        placeholder="🔍 Buscar Cliente, Empresa ou Pedido"
        onkeyup="pesquisarPedidos()">

</section>

<section class="kanban">

    <div class="coluna alinhamento-coluna">
        <h2>ALINHAMENTO (<span id="count-alinhamento">0</span>)</h2>
        <div id="alinhamento"></div>
    </div>

    <div class="coluna boleto-coluna">
        <h2>BOLETO (<span id="count-boleto">0</span>)</h2>
        <div id="boleto"></div>
    </div>

    <div class="coluna pagamento-coluna">
        <h2>PAGAMENTO DE BOLETO (<span id="count-pagamento">0</span>)</h2>
        <div id="pagamento"></div>
    </div>

    <div class="coluna coleta-coluna">
        <h2>COLETA (<span id="count-coleta">0</span>)</h2>
        <div id="coleta"></div>
    </div>

</section>

</section>

<section class="excedentes">

    <h2>💰 Excedentes</h2>

    <input type="text" id="nomeExcedente" placeholder="Cliente">

    <input type="number" id="valorExcedente" placeholder="Valor">

    <button onclick="adicionarExcedente()">
        Adicionar Excedente
    </button>

    <div id="listaExcedentes"></div>

</section>

<script src="script.js"></script>

</body>
</html>
